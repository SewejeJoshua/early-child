  <!-- Description -->
  <meta name="description" content="Register your child for EarlyChildhood Children's Day 2026 celebration filled with fun and joy." />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="🎉 Children's Day 2026 Registration" />

  <!-- Your actual domain -->
  <meta property="og:url" content="https://early-childhood.onrender.com/" />

  <!-- Your image (already correct ✅) -->
  <meta property="og:image" content="https://early-childhood.onrender.com/chiday.jpeg" />

  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Optional -->
  <meta name="twitter:card" content="summary_large_image" />
</head>
